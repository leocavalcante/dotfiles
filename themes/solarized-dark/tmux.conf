# Solarized Dark tmux theme
# Source this file from .tmux.conf: source-file ~/.config/tmux/solarized-dark.conf
# Colors from https://ethanschoonover.com/solarized/

# Status bar
set -g status-style "bg=default,fg=#586e75"
set -g status-left "#[fg=#002b36,bg=#268bd2,bold] #S #[fg=#268bd2,bg=default]"
set -g status-right "#{prefix_highlight} #[fg=#6c71c4] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') #[fg=#073642]#[fg=#b58900,bg=#073642]  #{?AWS_PROFILE,#{AWS_PROFILE},-} #[fg=#268bd2] ⎈ #{kube_context} #[fg=#586e75] #{b:pane_current_path} "

# Window status
set -g window-status-format "#[fg=#586e75,bg=default]  #I:#W  "
set -g window-status-current-format "#[fg=#002b36,bg=#268bd2]#[fg=#002b36,bg=#268bd2,bold] #I:#W #[fg=#268bd2,bg=default]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#268bd2"

# Message style
set -g message-style "fg=#839496,bg=#073642"
set -g message-command-style "fg=#839496,bg=#073642"

# Mode style (copy mode highlighting)
set -g mode-style "fg=#002b36,bg=#b58900"

# Clock
set -g clock-mode-colour "#268bd2"

# Bell
set -g window-status-bell-style "fg=#dc322f,bg=default,bold"

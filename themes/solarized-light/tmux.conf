# Solarized Light tmux theme
# Source this file from .tmux.conf: source-file ~/.config/tmux/solarized-light.conf
# Colors from https://ethanschoonover.com/solarized/

# Status bar
set -g status-style "bg=default,fg=#93a1a1"
set -g status-left "#[fg=#fdf6e3,bg=#268bd2,bold] #S #[fg=#268bd2,bg=default]"
set -g status-right "#{prefix_highlight} #[fg=#6c71c4] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') #[fg=#eee8d5]#[fg=#b58900,bg=#eee8d5]  #{?AWS_PROFILE,#{AWS_PROFILE},-} #[fg=#268bd2] ⎈ #{kube_context} #[fg=#93a1a1] #{b:pane_current_path} "

# Window status
set -g window-status-format "#[fg=#93a1a1,bg=default]  #I:#W  "
set -g window-status-current-format "#[fg=#fdf6e3,bg=#268bd2]#[fg=#fdf6e3,bg=#268bd2,bold] #I:#W #[fg=#268bd2,bg=default]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#eee8d5"
set -g pane-active-border-style "fg=#268bd2"

# Message style
set -g message-style "fg=#657b83,bg=#eee8d5"
set -g message-command-style "fg=#657b83,bg=#eee8d5"

# Mode style (copy mode highlighting)
set -g mode-style "fg=#fdf6e3,bg=#b58900"

# Clock
set -g clock-mode-colour "#268bd2"

# Bell
set -g window-status-bell-style "fg=#dc322f,bg=default,bold"

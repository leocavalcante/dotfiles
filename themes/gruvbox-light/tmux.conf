# Gruvbox Light theme for tmux
set -g status-position bottom
set -g status-style "bg=default,fg=#7c6f64"
set -g status-left-length 40
set -g status-right-length 200
set -g status-left "#[fg=#fbf1c7,bg=#076678,bold] #S #[fg=#076678,bg=default]"
set -g status-right "#{prefix_highlight} #[fg=#8f3f71] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') #[fg=#d5c4a1]#[fg=#af3a03,bg=#d5c4a1]  #{?AWS_PROFILE,#{AWS_PROFILE},-} #[fg=#076678] ⎈ #{kube_context} #[fg=#7c6f64] #{b:pane_current_path} "
set -g window-status-format "#[fg=#7c6f64,bg=default]  #I:#W  "
set -g window-status-current-format "#[fg=#fbf1c7,bg=#076678]#[fg=#fbf1c7,bg=#076678,bold] #I:#W #[fg=#076678,bg=default]"
set -g window-status-separator ""
set -g pane-border-style "fg=#d5c4a1"
set -g pane-active-border-style "fg=#076678"
set -g message-style "fg=#3c3836,bg=#ebdbb2"
set -g message-command-style "fg=#3c3836,bg=#ebdbb2"
set -g mode-style "fg=#fbf1c7,bg=#b57614"
set -g clock-mode-colour "#076678"
set -g window-status-bell-style "fg=#9d0006,bg=default,bold"

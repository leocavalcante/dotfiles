# settings
set -g prefix C-Space
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g status-position bottom

# Gruvbox Dark theme
# Status bar
set -g status-style "bg=default,fg=#a89984"
set -g status-left-length 40
set -g status-right-length 200
set -g status-left "#[fg=#282828,bg=#83a598,bold] #S #[fg=#83a598,bg=default]"
set -g status-right "#{prefix_highlight} #[fg=#d3869b] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') #[fg=#504945]#[fg=#fe8019,bg=#504945]  #{?AWS_PROFILE,#{AWS_PROFILE},-} #[fg=#83a598] ⎈ #{kube_context} #[fg=#a89984] #{b:pane_current_path} "

# Window status
set -g window-status-format "#[fg=#a89984,bg=default]  #I:#W  "
set -g window-status-current-format "#[fg=#282828,bg=#83a598]#[fg=#282828,bg=#83a598,bold] #I:#W #[fg=#83a598,bg=default]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#83a598"

# Message style
set -g message-style "fg=#ebdbb2,bg=#3c3836"
set -g message-command-style "fg=#ebdbb2,bg=#3c3836"

# Mode style (copy mode highlighting)
set -g mode-style "fg=#282828,bg=#fabd2f"

# Clock
set -g clock-mode-colour "#83a598"

# Bell
set -g window-status-bell-style "fg=#fb4934,bg=default,bold"

# Go to an active session when the current is destroyed
set-option -g detach-on-destroy off

# At window index at 1. It is most ergnomic for Prefix+N
set -g base-index 1

# bindings
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# windowing
bind h split-window -v
bind j previous-window
bind k next-window
bind l split-window -h

# resize panes
bind-key -r C-h resize-pane -L 2
bind-key -r C-j resize-pane -D 2
bind-key -r C-k resize-pane -U 2
bind-key -r C-l resize-pane -R 2

# plugins
set -g @vim_navigator_prefix_mapping_clear_screen ""
set -g @plugin "tony-sol/tmux-kubectx"
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'

# continuum auto-restore
set -g @continuum-restore 'on'

# sessionx trigger
set -g @sessionx-bind 's'
set -g @sessionx-filter-current 'false'

run '~/.tmux/plugins/tpm/tpm'


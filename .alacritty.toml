[font]
normal = { family = "JetBrainsMono Nerd Font Mono", style = "Regular" }
size = 12

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/bin/zsh"
args = ["-lc", "tmux"]

[window]
padding = { x = 10, y = 10 }
decorations = "Buttonless"
opacity = 1
blur = true
startup_mode = "Maximized"

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.cursor]
text = "#282828"
cursor = "#ebdbb2"

[colors.selection]
text = "#ebdbb2"
background = "#504945"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\x1b\r"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "open"  # macOS default. Use "xdg-open" on Linux.
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods = "Shift"


[font]
normal = { family = "JetBrainsMono Nerd Font Mono", style = "Regular" }
size = 9

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "wsl.exe"
args = ["-d", "Ubuntu", "--cd", "~", "zsh", "-lc", "tmux"]

[window]
padding = { x = 10, y = 10 }
decorations = "Full"
opacity = 1
startup_mode = "Maximized"

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.cursor]
text = "#282828"
cursor = "#ebdbb2"

[colors.selection]
text = "#ebdbb2"
background = "#504945"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b\r"

[[keyboard.bindings]]
# tmux's C-Space prefix is the NUL control byte.
key = "Space"
mods = "Control"
chars = "\u0000"

[[keyboard.bindings]]
# Paste the Windows host clipboard into terminal applications such as Codex.
key = "V"
mods = "Control"
action = "Paste"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "explorer.exe"
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods = "Shift"

"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 3000

# GitHub Dark Default palette
palette = "gruvbox_dark"

[palettes.gruvbox_dark]
bg = "#282828"
fg = "#ebdbb2"
fg_muted = "#a89984"
fg_subtle = "#928374"
red = "#fb4934"
bright_red = "#cc241d"
orange = "#fe8019"
yellow = "#fabd2f"
bright_yellow = "#d79921"
green = "#b8bb26"
bright_green = "#98971a"
cyan = "#8ec07c"
bright_cyan = "#689d6a"
blue = "#83a598"
bright_blue = "#458588"
purple = "#d3869b"
magenta = "#b16286"

[username]
disabled = true

[hostname]
disabled = false

[kubernetes]
disabled = true

[aws]
disabled = true

[directory]
truncation_length = 2
truncate_to_repo = false
style = "bold fg"

[package]
disabled = true

[docker_context]
disabled = true

[container]
disabled = true

[cmd_duration]
disabled = false
min_time = 0
show_milliseconds = true
style = "yellow"

[git_branch]
style = "purple"

[git_status]
disabled = true

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[nodejs]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]
detect_extensions = []

[gcloud]
disabled = true

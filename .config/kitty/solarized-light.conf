## blurb:    Precision colors for machines and people

# The basic colors
foreground              #657b83
background              #fdf6e3
selection_foreground    #586e75
selection_background    #eee8d5

# Cursor colors
cursor                  #586e75
cursor_text_color       #fdf6e3

# URL underline color when hovering with mouse
